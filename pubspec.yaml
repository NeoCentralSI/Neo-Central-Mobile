name: neocentral
description: "Centralize academic services for information system departement andalas university"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  aad_oauth: ^1.0.0              # Azure AD OAuth — purpose-built untuk Microsoft
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.3
  http: ^1.2.2
  http_parser: ^4.1.0
  google_fonts: ^8.0.2
  firebase_core: ^4.4.0
  firebase_messaging: ^16.1.1
  file_picker: ^10.3.10
  flutter_local_notifications: 18.0.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.4

flutter:
  uses-material-design: true

  assets:
    - assets/images/neocentral_logo.png
    - assets/images/microsoft_logo.png
    - assets/images/neocentral_white.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/appicon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/images/appicon.png"
